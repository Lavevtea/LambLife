<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#82A884">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style"
  content="black-translucent">
</head>
<body>

  <!-- EID SCREEN -->
  <div id="eidScreen" class="fullscreen-overlay" style="display:none">
    <div class="eid-content">
      <div class="eid-crescent">☪</div>
      <div class="eid-title">Selamat</div>
      <div class="eid-title2">Eid ul-Adha</div>
      <div class="eid-body">Your qurban has been fulfilled.<br>May it be accepted.</div>
      <div id="bondScore" class="bond-score"></div>
      <button class="pixel-btn small" id="replayBtn">Play Again</button>
    </div>
  </div>

  <!-- GAME CONSOLE SHELL -->
  <div id="console">

    <!-- LEFT CONTROLS -->
    <div class="side-controls left">
      <div class="dpad">
        <button class="dpad-btn up"    data-dir="up"    disabled>▲</button>
        <button class="dpad-btn left"  data-dir="left"  disabled>◀</button>
        <button class="dpad-btn center"></button>
        <button class="dpad-btn right" data-dir="right" disabled>▶</button>
        <button class="dpad-btn down"  data-dir="down"  disabled>▼</button>
      </div>
    </div>

    <!-- SCREEN AREA -->
    <div class="screen-bezel">
      <div id="screen">

        <!-- START SCREEN -->
        <div id="startScreen">
           <img src="assets/logo.png" class="ss-logo">
          <button id="startBtn" class="img-btn">
            <img src="assets/start_btn.png" alt="Start">
          </button>
        </div>
        
        <div id="nameOverlay" style="display:none">
          <div class="name-box">
            <div class="name-title"></div>
            <input id="nameInput" type="text" maxlength="7" placeholder="ex.Billy" autocomplete="off" spellcheck="false">
            <button id="nameOkBtn" class="ok-btn"></button>
          </div>
        </div>

        <div id="gameOverlay" style="display:none">
          <div id="overlayTop">
            <div id="lambNameDisplay">Domba</div>
            <div id="timerDisplay">3:00</div>
          </div>
          <div id="overlayStats">
            <div class="stat-bar-wrap"><div class="meter-bar"><div id="foodFill"  class="stat-fill food-fill"  style="width:80%"></div></div></div>
            <div class="stat-bar-wrap"><div class="meter-bar"><div id="happyFill" class="stat-fill happy-fill" style="width:80%"></div></div></div>
            <div class="stat-bar-wrap"><div class="meter-bar"><div id="sleepFill" class="stat-fill sleep-fill" style="width:80%"></div></div></div>
          </div>
        </div>

        <!-- WORLD -->
        <div id="world" style="display:none">
          <div id="tileLayer"></div>
          <div id="foodItem" style="display:none">🌿</div>
          <div id="dialogue"></div>
        </div>
        <div id="lamb">
          <img id="lambSprite" src="assets/lamb.png" alt="lamb">
          <div id="lambState"></div>
        </div>

        <!-- CUTSCENE -->
        <div id="cutscene" style="display:none">
          <div id="cutsceneContent"></div>
        </div>

      </div><!-- /screen -->
    </div><!-- /screen-bezel -->

    <!-- RIGHT CONTROLS -->
    <div class="side-controls right">
      <div class="abxy">
        <div class="abxy-row top">
          <button class="abxy-btn x" id="playBtn"  disabled>PLAY</button>
        </div>
        <div class="abxy-row mid">
          <button class="abxy-btn y" id="petBtn"   disabled>PET</button>
          <button class="abxy-btn a" id="feedBtn"  disabled>FEED</button>
        </div>
        <div class="abxy-row bot">
          <button class="abxy-btn b" id="sleepBtn" disabled>SLEEP</button>
        </div>
      </div>
    </div>

  </div><!-- /console -->


  <script src="script.js"></script>
</body>
</html>
